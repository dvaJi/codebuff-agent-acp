name: Release

# Publish the package to npm when a GitHub Release is published, mirroring the
# canonical guide:
# https://docs.github.com/en/actions/tutorials/publish-packages/publish-nodejs-packages
#
# Release flow:
#   1. bump `version` in package.json and commit
#   2. create a GitHub Release on that tag (or: `gh release create vX.Y.Z`)
#   3. this workflow runs checks, builds, and publishes with npm provenance.
#
# Requires the `NPM_TOKEN` repository secret (automation token, 2FA-exempt).
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm publish provenance

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG="${TAG#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Release tag '$TAG' does not match package.json version '$PKG'"
            exit 1
          fi
          echo "Releasing $PKG"

      - name: Lint, typecheck, format, test
        run: npm run check

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
